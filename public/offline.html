<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#D81B2E">
  <title>Hors ligne - Cora Jewelry</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    :root {
      --cora-red: #D81B2E;
      --cora-black: #0B0B0D;
      --cora-white: #F4F2EE;
      --cora-cream: #FAF8F5;
      --cora-gray: #6E6A66;
    }
    
    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    
    body {
      background: var(--cora-white);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    }
    
    .container {
      text-align: center;
      padding: 2rem;
      max-width: 400px;
    }
    
    .logo {
      width: 80px;
      height: 80px;
      margin: 0 auto 2rem;
      background: var(--cora-red);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 2.5rem;
      font-weight: bold;
      font-family: 'Cormorant Garamond', serif;
    }
    
    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2rem;
      color: var(--cora-black);
      margin-bottom: 1rem;
    }
    
    p {
      color: var(--cora-gray);
      line-height: 1.6;
      margin-bottom: 2rem;
    }
    
    .icon {
      width: 64px;
      height: 64px;
      margin: 0 auto 1.5rem;
      background: var(--cora-cream);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .icon svg {
      width: 32px;
      height: 32px;
      stroke: var(--cora-red);
    }
    
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: var(--cora-red);
      color: white;
      padding: 1rem 2rem;
      border-radius: 14px;
      text-decoration: none;
      font-weight: 500;
      border: none;
      cursor: pointer;
      font-size: 1rem;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(216, 27, 46, 0.3);
    }
    
    .btn svg {
      width: 20px;
      height: 20px;
    }
    
    @media (prefers-color-scheme: dark) {
      body {
        background: var(--cora-black);
      }
      h1 {
        color: var(--cora-white);
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">C</div>
    <div class="icon">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" />
      </svg>
    </div>
    <h1>Vous êtes hors ligne</h1>
    <p>Impossible de se connecter à Cora Jewelry. Vérifiez votre connexion internet et réessayez.</p>
    <button class="btn" onclick="window.location.reload()">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
      </svg>
      Réessayer
    </button>
  </div>
</body>
</html>
